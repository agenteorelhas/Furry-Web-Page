<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<title>Coelho</title>

<link rel="stylesheet" href="style.css">

</head>
  
<script src="https://cdn.jsdelivr.net/npm/particles.js"></script>
  
<body>

<div id="particles-js"></div>
  
<div class="layout">

<!-- MENU LATERAL -->

<aside class="sidebar">

<div class="logoArea">

<img src="img/logo.png">

</div>

<button onclick="mostrarPagina('home')">🏠 .</button>

<button onclick="mostrarPagina('personagens')">🐺 .</button>

<button onclick="mostrarPagina('comunidade')">💬 .</button>

<button onclick="mostrarPagina('perfil')">👤 .</button>

</aside>



<!-- CONTEÚDO -->

<main class="content">

<section id="home" class="pagina">

<h1>🐾 Coelho Home</h1>

<p>Bem-vindo a minha Galeria.</p>

</section>



<section id="personagens" class="pagina">

<h2>Personagens</h2>

<div class="cards">

<div class="card">

<img src="img/furry1.jpg">

<h3>imagem 1</h3>

<button onclick="curtir(this)">❤️ <span>0</span></button>

</div>


<div class="card">

<img src="img/furry2.jpg">

<h3>imagem 2</h3>

<button onclick="curtir(this)">❤️ <span>0</span></button>

</div>

</div>

</section>



<section id="comunidade" class="pagina">

<h2>Comunidade</h2>

<textarea id="postText" placeholder="Compartilhe algo..."></textarea>

<br>

<button onclick="postar()">Postar</button>

<div id="feed"></div>

</section>



<section id="perfil" class="pagina">

<h2>Seu Avatar</h2>

<img id="avatarImg" src="img/avatar.png">

<br>

<button onclick="trocarHumor()">Trocar humor</button>

</section>



</main>

</div>

<script src="script.js"></script>

</body>
</html>
