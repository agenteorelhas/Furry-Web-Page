<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<title>Furry Gallery</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<h1>🐾 Furry Gallery</h1>

<input id="search" placeholder="Pesquisar arte...">

</header>


<section class="profile">

<img src="img/avatar.jpg">

<h2>NeoFox</h2>

<p>Artista digital furry</p>

</section>


<section class="gallery" id="gallery">

<div class="art" data-name="wolf">

<img src="img/art1.jpg">

<div class="info">

<h3>Lobo Guerreiro</h3>

<button onclick="favoritar(this)">❤️ Favoritar</button>

</div>

</div>


<div class="art" data-name="fox">

<img src="img/art2.jpg">

<div class="info">

<h3>Raposa Neon</h3>

<button onclick="favoritar(this)">❤️ Favoritar</button>

</div>

</div>


<div class="art" data-name="dragon">

<img src="img/art3.jpg">

<div class="info">

<h3>Dragão Sombrio</h3>

<button onclick="favoritar(this)">❤️ Favoritar</button>

</div>

</div>

</section>


<footer>

<p>Furry Gallery © 2026</p>

</footer>

<script src="script.js"></script>

</body>

</html>
