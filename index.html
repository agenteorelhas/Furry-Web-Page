<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<title>Furry Universe</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<div class="logoArea">

<img src="img/logo.png" class="logo">

<h1>Furry Universe</h1>

</div>

<nav>

<a href="#">Home</a>
<a href="#">Personagens</a>
<a href="#">Comunidade</a>

</nav>

</header>


<section class="hero">

<h2>Bem-vindo ao Universo Furry</h2>

<p>Arte, personagens e comunidade.</p>

<button onclick="scrollGaleria()">Explorar</button>

</section>


<section class="characters" id="galeria">

<h2>Personagens</h2>

<div class="card">

<img src="img/furry1.jpg">

<h3>Raven Wolf</h3>

<p>Lobo explorador.</p>

<button onclick="curtir(this)">❤️ Curtir <span>0</span></button>

</div>


<div class="card">

<img src="img/furry2.jpg">

<h3>Neo Fox</h3>

<p>Raposa hacker.</p>

<button onclick="curtir(this)">❤️ Curtir <span>0</span></button>

</div>

</section>


<section class="avatar">

<h2>Seu Avatar</h2>

<img id="avatarImg" src="img/avatar.png">

<br>

<button onclick="trocarHumor()">Trocar humor</button>

</section>


<section class="postar">

<h2>Comunidade</h2>

<textarea id="postText" placeholder="Compartilhe algo..."></textarea>

<br>

<button onclick="postar()">Postar</button>

<div id="feed"></div>

</section>


<footer>

<p>🐾 Furry Universe</p>

</footer>

<script src="script.js"></script>

</body>

</html>
